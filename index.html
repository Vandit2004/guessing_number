<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="box">
            <h1>Number Guessing</h1>
            <p style="color: red; font-size: 20px;">Guess the number between 1 to 100</p>
            <div class="enter">
            <input type="text" class="input" placeholder="enter the number">
            <button class="submit">submit</button>
            </div>
            <p class="output">Message :</p>
            <p class="attempt">Attemps : 0</p>
            <div class="new">
            <button class="restart">restart</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
